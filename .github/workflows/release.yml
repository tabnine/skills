name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Bump level (major/minor/patch/premajor/preminor/prepatch/prerelease) or explicit version (e.g. 2.1.0-beta.0)'
        required: false
        default: 'minor'

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup git
        run: |
          set -e
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Resolve version
        run: |
          set -e
          npm install -g semver
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          INPUT="${{ github.event.inputs.version || 'minor' }}"

          case "$INPUT" in
            major|minor|patch|premajor|preminor|prepatch|prerelease)
              NEW_VERSION=$(semver -i "$INPUT" "$CURRENT")
              ;;
            *)
              NEW_VERSION=$(semver "$INPUT") || {
                echo "::error::Invalid version: '$INPUT'. Must be a bump level (major/minor/patch/premajor/preminor/prepatch/prerelease) or a valid semver (e.g. 1.2.3, 1.2.3-beta.0)"
                exit 1
              }
              ;;
          esac

          echo "$NEW_VERSION" > VERSION
          echo "TAG=$NEW_VERSION" >> $GITHUB_ENV

      - name: Update plugin versions
        # Bumps every plugin.json under `plugins/{claude,cursor}/<plugin>/.{claude,cursor}-plugin/`
        # and the marketplace entries that point at those plugins. CLI
        # binaries are released independently under `ctx-cli-v*` tags.
        run: |
          set -e
          for f in plugins/claude/*/.claude-plugin/plugin.json plugins/cursor/*/.cursor-plugin/plugin.json; do
            [ -f "$f" ] || continue
            jq --arg v "${{ env.TAG }}" '.version = $v' "$f" > /tmp/plugin.json && mv /tmp/plugin.json "$f"
            echo "  bumped $f -> ${{ env.TAG }}"
          done
          for f in .claude-plugin/marketplace.json .cursor-plugin/marketplace.json; do
            [ -f "$f" ] || continue
            jq --arg v "${{ env.TAG }}" '.plugins |= map(.version = $v)' "$f" > /tmp/marketplace.json && mv /tmp/marketplace.json "$f"
            echo "  bumped $f plugin entries -> ${{ env.TAG }}"
          done

      - name: Commit and tag
        run: |
          set -e
          git add VERSION plugins/claude/*/.claude-plugin/plugin.json plugins/cursor/*/.cursor-plugin/plugin.json .claude-plugin/marketplace.json .cursor-plugin/marketplace.json
          git commit -m "chore: bump version to ${{ env.TAG }} [skip ci]"
          git tag "v${{ env.TAG }}"
          git push origin HEAD
          git push origin "v${{ env.TAG }}"

      - name: Summary
        run: |
          echo "### Release v${{ env.TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tagged \`v${{ env.TAG }}\` and pushed to git" >> $GITHUB_STEP_SUMMARY
