name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Bump level (major/minor/patch/premajor/preminor/prepatch/prerelease) or explicit version (e.g. 2.1.0-beta.0)'
        required: false
        default: 'minor'

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup git
        run: |
          set -e
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Resolve version
        run: |
          set -e
          npm install -g semver
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          INPUT="${{ github.event.inputs.version || 'minor' }}"

          case "$INPUT" in
            major|minor|patch|premajor|preminor|prepatch|prerelease)
              NEW_VERSION=$(semver -i "$INPUT" "$CURRENT")
              ;;
            *)
              NEW_VERSION=$(semver "$INPUT") || {
                echo "::error::Invalid version: '$INPUT'. Must be a bump level (major/minor/patch/premajor/preminor/prepatch/prerelease) or a valid semver (e.g. 1.2.3, 1.2.3-beta.0)"
                exit 1
              }
              ;;
          esac

          echo "$NEW_VERSION" > VERSION
          echo "TAG=$NEW_VERSION" >> $GITHUB_ENV

      - name: Update plugin versions
        run: |
          set -e
          for f in plugins/claude/tabnine/.claude-plugin/plugin.json \
                   plugins/cursor/tabnine/.cursor-plugin/plugin.json \
                   plugins/claude/ctx/.claude-plugin/plugin.json \
                   plugins/cursor/ctx/.cursor-plugin/plugin.json; do
            if [ -f "$f" ]; then
              jq --arg v "${{ env.TAG }}" '.version = $v' "$f" > /tmp/plugin.json && mv /tmp/plugin.json "$f"
            fi
          done

      - name: Commit and tag
        run: |
          set -e
          git add -A
          git commit -m "chore: bump version to ${{ env.TAG }} [skip ci]"
          git tag "v${{ env.TAG }}"
          git push origin HEAD
          git push origin "v${{ env.TAG }}"

      - name: Create GitHub release
        run: |
          gh release create "v${{ env.TAG }}" \
            --title "v${{ env.TAG }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Summary
        run: |
          echo "### Release v${{ env.TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tagged \`v${{ env.TAG }}\` and pushed to git" >> $GITHUB_STEP_SUMMARY
          echo "- Created GitHub release \`v${{ env.TAG }}\`" >> $GITHUB_STEP_SUMMARY
